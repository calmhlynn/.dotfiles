set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'catppuccin/tmux'

set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-ghostty:RGB,xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g allow-passthrough on
set -s extended-keys always
set-environment -g COLORTERM truecolor

set -g mouse on
set -g set-clipboard on
setw -g mode-keys vi
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"

bind Left  if-shell "$is_vim" 'send-keys C-w Left'  'select-pane -L'
bind Down  if-shell "$is_vim" 'send-keys C-w Down'  'select-pane -D'
bind Up    if-shell "$is_vim" 'send-keys C-w Up'    'select-pane -U'
bind Right if-shell "$is_vim" 'send-keys C-w Right' 'select-pane -R'

bind-key -T prefix -r C-Left  resize-pane -L 5
bind-key -T prefix -r C-Right resize-pane -R 5
bind-key -T prefix -r C-Up    resize-pane -U 5
bind-key -T prefix -r C-Down  resize-pane -D 5

set -g status-position top

set -g @catppuccin_flavor 'mocha'
set -g @catppuccin_status_background 'default'
set -g @catppuccin_window_status_style 'rounded'
set -g @catppuccin_window_flags 'icon'
set -g @catppuccin_window_text ' #W'
set -g @catppuccin_window_current_text ' #W'
set -g @catppuccin_date_time_text ' %Y-%m-%d %H:%M'

if "test ! -d ~/.tmux/plugins/tpm" \
  "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"
run '~/.tmux/plugins/tpm/tpm'

set -g status-right-length 100
set -g status-left-length 100
set -gF status-left '  #{?client_prefix,#[fg=#{@thm_green}]● ,  }'
set -gF status-right '#{E:@catppuccin_status_session}'
set -agF status-right '#{E:@catppuccin_status_directory}'
set -agF status-right '#{E:@catppuccin_status_date_time}'
